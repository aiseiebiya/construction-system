name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deploy directory
      run: mkdir -p deploy

    - name: Copy files to deploy directory
      run: |
        cp index.html deploy/
        cp src/css/style.css deploy/
        cp src/data/stations.js deploy/
        cp src/js/main.js deploy/

    - name: Fix file paths in index.html
      run: |
        sed -i 's|src/css/style.css|style.css|g' deploy/index.html
        sed -i 's|src/data/stations.js|stations.js|g' deploy/index.html
        sed -i 's|src/js/main.js|main.js|g' deploy/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deploy