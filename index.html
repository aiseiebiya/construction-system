<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青岛地铁6号线分段施工预想图自动生成系统</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>青岛地铁6号线分段施工预想图自动生成系统</h1>
            <div class="header-info">
                <span class="line-info">6号线一期 · 综合信息示意图</span>
            </div>
        </header>

        <div class="input-panel">
            <div class="panel-section input-section">
                <h3>作业计划录入</h3>
                <div class="construction-forms-container-horizontal" id="constructionFormsContainer">
                    <div class="construction-form-horizontal" id="constructionForm_0">
                        <div class="form-header-horizontal">
                            <span>作业 #1</span>
                        </div>
                        <div class="form-group-horizontal">
                            <div class="form-field-horizontal">
                                <label>作业代码</label>
                                <input type="text" class="constructionCode" placeholder="如: 6A1-30-01">
                            </div>
                            <div class="form-field-horizontal">
                                <label>作业类型</label>
                                <select class="constructionType">
                                    <option value=""></option>
                                    <option value="A1_LIVE">A1动车点（接触轨带电）</option>
                                    <option value="A1_DEAD">A1动车点（接触轨不带电）</option>
                                    <option value="A2_DEAD">A2人工点（接触轨不带电）</option>
                                    <option value="A3_LIVE">A3人工点（接触轨带电）</option>
                                    <option value="A3_DEAD">A3人工点（接触轨不带电）</option>
                                </select>
                            </div>
                            <div class="form-field-horizontal station-field">
                                <label>起点站点</label>
                                <div class="station-with-direction-horizontal">
                                    <select class="startStation"></select>
                                    <div class="direction-buttons-horizontal">
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="startDirection_0" value="both" checked>
                                            <span>上下行</span>
                                        </label>
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="startDirection_0" value="up">
                                            <span>上行</span>
                                        </label>
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="startDirection_0" value="down">
                                            <span>下行</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-field-horizontal station-field">
                                <label>终点站点</label>
                                <div class="station-with-direction-horizontal">
                                    <select class="endStation"></select>
                                    <div class="direction-buttons-horizontal">
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="endDirection_0" value="both" checked>
                                            <span>上下行</span>
                                        </label>
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="endDirection_0" value="up">
                                            <span>上行</span>
                                        </label>
                                        <label class="radio-label-horizontal">
                                            <input type="radio" name="endDirection_0" value="down">
                                            <span>下行</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <button class="confirm-btn-horizontal" onclick="confirmConstruction(0)">确定</button>
                            <button class="add-btn-horizontal" onclick="addConstruction(0)">添加</button>
                            <button class="delete-btn-horizontal" onclick="deleteConstruction(0)">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="panel-section">
                    <h3>冲突检测结果</h3>
                    <div class="conflict-result" id="conflictResult"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="toolbar">
                    <button onclick="exportToPDF()">导出PDF</button>
                </div>
                <div class="map-container">
                    <svg id="mapSvg" width="100%" height="100%" viewBox="0 0 2500 400" preserveAspectRatio="xMidYMid meet">
                        <defs>
                            <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#007bff;stop-opacity:1" />
                            </linearGradient>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                            <marker id="redLight" markerWidth="20" markerHeight="20" refX="10" refY="10">
                                <circle cx="10" cy="10" r="8" fill="#ff0000" filter="url(#glow)"/>
                                <circle cx="10" cy="10" r="4" fill="#ffffff"/>
                            </marker>
                            <marker id="redLightSmall" markerWidth="14" markerHeight="14" refX="7" refY="7">
                                <circle cx="7" cy="7" r="5" fill="#ff0000" filter="url(#glow)"/>
                                <circle cx="7" cy="7" r="2" fill="#ffffff"/>
                            </marker>
                        </defs>
                        <g id="contentGroup">
                            <g id="backgroundLayer"></g>
                            <g id="lineLayer"></g>
                            <g id="stationLayer"></g>
                            <g id="constructionLayer"></g>
                            <g id="protectionLayer"></g>
                            <g id="redLightLayer"></g>
                        </g>
                    </svg>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #0066cc;"></div>
                        <span>上行线 (灵山湾→横云山路)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #cc6600;"></div>
                        <span>下行线 (横云山路→灵山湾)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #28a745;"></div>
                        <span>A1带电施工区域</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #dc3545;"></div>
                        <span>A1不带电施工区域</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #fd7e14;"></div>
                        <span>A2不带电施工区域</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #6f42c1;"></div>
                        <span>A3带电施工区域</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #e83e8c;"></div>
                        <span>A3不带电施工区域</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(144,238,144,0.4); border: 1px dashed #ff0000;"></div>
                        <span>防护区域带电</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(255,228,181,0.4); border: 1px dashed #ff0000;"></div>
                        <span>防护区域不带电</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color red-light-icon"></div>
                        <span>红闪灯</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>青岛地铁6号线分段施工预想图自动生成系统 · 施工管理规定9.4/9.5 · 附录F</p>
        </footer>
    </div>

    <!-- 修改作业弹出框 -->
    <script src="src/data/stations.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
